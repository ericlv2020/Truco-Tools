<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI — Deal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --surface2: #1c1f1d;
    --border: #2a2e2c;
    --accent: #c8f542;
    --accent2: #42f5a7;
    --warn: #f5a742;
    --danger: #f54242;
    --text: #e8ede9;
    --muted: #6b756d;
    --won: #42f5a7;
    --lost: #f54242;
    --sent: #c8f542;
    --draft: #6b756d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #0d0f0e;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .refresh-btn:hover { background: var(--border); }

  /* MAIN */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* KPI STRIP */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .kpi.warn::before { background: var(--warn); }
  .kpi.danger::before { background: var(--danger); }
  .kpi.green::before { background: var(--accent2); }

  .kpi-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .kpi-value.accent { color: var(--accent); }
  .kpi-value.warn { color: var(--warn); }
  .kpi-value.danger { color: var(--danger); }
  .kpi-value.green { color: var(--accent2); }

  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* SECTION LAYOUT */
  .sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .section-full { grid-column: 1 / -1; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .panel-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: var(--surface2); }

  .opp-name {
    font-weight: 600;
    font-size: 13px;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .account-name {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-rfq     { background: #1a2e4a; color: #5ab4f5; }
  .badge-quoted  { background: #2a2a1a; color: var(--accent); }
  .badge-negotiation { background: #2a1a00; color: var(--warn); }
  .badge-won     { background: #0a2a1a; color: var(--won); }
  .badge-lost    { background: #2a0a0a; color: var(--danger); }
  .badge-default { background: var(--surface2); color: var(--muted); }
  .badge-sent    { background: #1e2a0a; color: var(--accent); }
  .badge-draft   { background: var(--surface2); color: var(--muted); }
  .badge-overdue { background: #2a0a0a; color: var(--danger); }

  .value {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-align: right;
    white-space: nowrap;
  }

  .value.high { color: var(--accent); font-weight: 500; }
  .value.med  { color: var(--warn); }

  .prob {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .prob.high { color: var(--won); }

  .date-cell {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .date-cell.overdue { color: var(--danger); }
  .date-cell.soon    { color: var(--warn); }

  /* NEXT ACTION */
  .next-action {
    font-size: 12px;
    color: var(--muted);
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* STAGE BAR */
  .stage-breakdown {
    display: flex;
    gap: 4px;
    padding: 16px 20px;
    flex-wrap: wrap;
  }

  .stage-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
  }

  .stage-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .stage-chip-label { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }
  .stage-chip-count { font-weight: 700; color: var(--text); }

  /* LOADING / ERROR */
  .state-msg {
    padding: 40px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--danger);
    background: #2a0a0a;
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    margin: 16px 20px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #1a2200;
  }

  @media (max-width: 900px) {
    .kpi-strip { grid-template-columns: repeat(3, 1fr); }
    .sections { grid-template-columns: 1fr; }
    .section-full { grid-column: 1; }
    main { padding: 16px; }
    header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">TI</div>
    <div>
      <div class="logo-text">Truco International</div>
      <div class="logo-sub">Deal Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="loadAll()">⟳ Refresh</button>
  </div>
</header>

<main>
  <!-- KPI STRIP -->
  <div class="kpi-strip" id="kpiStrip">
    <div class="kpi"><div class="kpi-label">Active Opps</div><div class="kpi-value accent" id="kpiActiveOpps">—</div></div>
    <div class="kpi"><div class="kpi-label">Pipeline Value</div><div class="kpi-value accent" id="kpiPipeline">—</div><div class="kpi-sub">Total quoted</div></div>
    <div class="kpi"><div class="kpi-label">Weighted Value</div><div class="kpi-value" id="kpiWeighted">—</div><div class="kpi-sub">Probability adj.</div></div>
    <div class="kpi warn"><div class="kpi-label">Overdue Follow-Up</div><div class="kpi-value warn" id="kpiOverdue">—</div><div class="kpi-sub">Quotes past due</div></div>
    <div class="kpi green"><div class="kpi-label">Won (All Time)</div><div class="kpi-value green" id="kpiWon">—</div></div>
  </div>

  <!-- OPPORTUNITIES TABLE -->
  <div class="panel section-full" style="margin-bottom:20px;">
    <div class="panel-header">
      <span class="panel-title">Opportunities</span>
      <span class="panel-count" id="oppCount">loading...</span>
    </div>
    <div class="filter-bar">
      <span class="filter-label">Stage:</span>
      <button class="filter-btn active" onclick="filterOpps('all', this)">All</button>
      <button class="filter-btn" onclick="filterOpps('RFQ Received', this)">RFQ Received</button>
      <button class="filter-btn" onclick="filterOpps('Quoted', this)">Quoted</button>
      <button class="filter-btn" onclick="filterOpps('Negotiation', this)">Negotiation</button>
      <button class="filter-btn" onclick="filterOpps('Won', this)">Won</button>
      <button class="filter-btn" onclick="filterOpps('Lost', this)">Lost</button>
    </div>
    <div id="oppsTableWrap">
      <div class="state-msg"><span class="spinner"></span> Loading opportunities...</div>
    </div>
  </div>

  <!-- QUOTES TABLE -->
  <div class="panel section-full">
    <div class="panel-header">
      <span class="panel-title">Recent Quotes</span>
      <span class="panel-count" id="quoteCount">loading...</span>
    </div>
    <div class="filter-bar">
      <span class="filter-label">Status:</span>
      <button class="filter-btn active" onclick="filterQuotes('all', this)">All</button>
      <button class="filter-btn" onclick="filterQuotes('Sent', this)">Sent</button>
      <button class="filter-btn" onclick="filterQuotes('Draft', this)">Draft</button>
      <button class="filter-btn" onclick="filterQuotes('Won', this)">Won</button>
      <button class="filter-btn" onclick="filterQuotes('Lost', this)">Lost</button>
    </div>
    <div id="quotesTableWrap">
      <div class="state-msg"><span class="spinner"></span> Loading quotes...</div>
    </div>
  </div>
</main>

<script>
  // ── STATE ──────────────────────────────────────────────
  let allOpps = [];
  let allQuotes = [];
  let oppFilter = 'all';
  let quoteFilter = 'all';

  // ── AIRTABLE FETCH ─────────────────────────────────────
  async function fetchTable(tableName, fields) {
    const { apiKey, baseId } = AIRTABLE_CONFIG;
    let records = [];
    let offset = null;

    do {
      const params = new URLSearchParams({ pageSize: 100 });
      if (offset) params.set('offset', offset);

      const res = await fetch(
        `https://api.airtable.com/v0/${baseId}/${encodeURIComponent(tableName)}?${params}`,
        { headers: { Authorization: `Bearer ${apiKey}` } }
      );

      if (!res.ok) throw new Error(`Airtable error ${res.status}: ${await res.text()}`);
      const data = await res.json();
      records = records.concat(data.records);
      offset = data.offset;
    } while (offset);

    return records;
  }

  // ── LOAD ALL ───────────────────────────────────────────
  async function loadAll() {
    document.getElementById('lastUpdated').textContent = 'Refreshing...';
    try {
      const [oppRecords, quoteRecords] = await Promise.all([
        fetchTable(AIRTABLE_CONFIG.tables.opportunities),
        fetchTable(AIRTABLE_CONFIG.tables.quotes)
      ]);

      allOpps = oppRecords;
      allQuotes = quoteRecords;

      renderKPIs();
      renderOpps();
      renderQuotes();

      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      document.getElementById('lastUpdated').textContent = 'Error';
      showError('oppsTableWrap', err.message);
      showError('quotesTableWrap', err.message);
    }
  }

  // ── KPIs ───────────────────────────────────────────────
  function renderKPIs() {
    const active = allOpps.filter(r => !['Won','Lost'].includes(r.fields['Stage']));
    const pipeline = active.reduce((s, r) => s + (r.fields['Total Quoted Value'] || 0), 0);
    const weighted = allOpps.reduce((s, r) => s + (r.fields['Weighted Value'] || 0), 0);
    const won = allOpps.filter(r => r.fields['Stage'] === 'Won').length;

    const today = new Date(); today.setHours(0,0,0,0);
    const overdue = allQuotes.filter(r => {
      const d = r.fields['Follow-Up Date'];
      if (!d) return false;
      return new Date(d) < today && r.fields['Quote Status'] !== 'Won' && r.fields['Quote Status'] !== 'Lost';
    }).length;

    document.getElementById('kpiActiveOpps').textContent = active.length;
    document.getElementById('kpiPipeline').textContent = fmtUSD(pipeline);
    document.getElementById('kpiWeighted').textContent = fmtUSD(weighted);
    document.getElementById('kpiOverdue').textContent = overdue;
    document.getElementById('kpiWon').textContent = won;
  }

  // ── OPPORTUNITIES ──────────────────────────────────────
  function renderOpps() {
    const filtered = oppFilter === 'all'
      ? allOpps
      : allOpps.filter(r => (r.fields['Stage'] || '') === oppFilter);

    document.getElementById('oppCount').textContent = filtered.length + ' records';

    if (!filtered.length) {
      document.getElementById('oppsTableWrap').innerHTML =
        '<div class="state-msg">No opportunities match this filter.</div>';
      return;
    }

    const rows = filtered.map(r => {
      const f = r.fields;
      const stage = f['Stage'] || '';
      const val = f['Total Quoted Value'] || 0;
      const prob = f['Probability (%)'] || 0;
      const closure = f['Expected Closure Date'] ? fmtDate(f['Expected Closure Date']) : '—';
      const closureClass = closureDateClass(f['Expected Closure Date']);
      const nextAction = f['Next Action'] || '—';
      const nextDate = f['Next Action Date'] ? fmtDate(f['Next Action Date']) : '';
      const nextDateClass = closureDateClass(f['Next Action Date']);

      return `<tr>
        <td>
          <div class="opp-name">${esc(f['Opportunity Name'] || '—')}</div>
          <div class="account-name">${esc(f['Account'] ? (Array.isArray(f['Account']) ? f['Account'][0] : f['Account']) : '—')}</div>
        </td>
        <td><span class="badge ${stageBadge(stage)}">${esc(stage) || '—'}</span></td>
        <td class="value ${val > 100000 ? 'high' : val > 20000 ? 'med' : ''}">${fmtUSD(val)}</td>
        <td class="prob ${prob >= 70 ? 'high' : ''}">${prob}%</td>
        <td class="date-cell ${closureClass}">${closure}</td>
        <td class="next-action">${esc(nextAction)}</td>
        <td class="date-cell ${nextDateClass}">${nextDate}</td>
      </tr>`;
    }).join('');

    document.getElementById('oppsTableWrap').innerHTML = `
      <table>
        <thead><tr>
          <th>Opportunity</th>
          <th>Stage</th>
          <th style="text-align:right">Value (USD)</th>
          <th style="text-align:center">Prob.</th>
          <th>Closure</th>
          <th>Next Action</th>
          <th>Action Date</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterOpps(stage, btn) {
    oppFilter = stage;
    document.querySelectorAll('.filter-btn').forEach(b => {
      if (b.closest('.panel') === btn.closest('.panel')) b.classList.remove('active');
    });
    btn.classList.add('active');
    renderOpps();
  }

  // ── QUOTES ─────────────────────────────────────────────
  function renderQuotes() {
    const sorted = [...allQuotes].sort((a, b) => {
      const da = new Date(a.fields['Quote Date'] || 0);
      const db = new Date(b.fields['Quote Date'] || 0);
      return db - da;
    });

    const filtered = quoteFilter === 'all'
      ? sorted
      : sorted.filter(r => (r.fields['Quote Status'] || '') === quoteFilter);

    document.getElementById('quoteCount').textContent = filtered.length + ' records';

    if (!filtered.length) {
      document.getElementById('quotesTableWrap').innerHTML =
        '<div class="state-msg">No quotes match this filter.</div>';
      return;
    }

    const today = new Date(); today.setHours(0,0,0,0);

    const rows = filtered.map(r => {
      const f = r.fields;
      const status = f['Quote Status'] || '';
      const val = f['Quoted Value'] || f['Active Quoted Value'] || 0;
      const followUp = f['Follow-Up Date'];
      const followUpStr = followUp ? fmtDate(followUp) : '—';
      const followUpClass = followUpDateClass(followUp, status);
      const outcome = f['Outcome'] || '';
      const age = f['Quote Age'] !== undefined ? f['Quote Age'] + 'd' : '—';

      return `<tr>
        <td><span style="font-family:'DM Mono',monospace;font-size:12px;">${esc(f['Quote Number'] || '—')}</span></td>
        <td style="font-size:12px;color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(f['RFQ Reference'] || '—')}</td>
        <td style="font-size:12px;">${esc(f['Account'] ? (Array.isArray(f['Account']) ? f['Account'][0] : f['Account']) : '—')}</td>
        <td><span class="badge ${statusBadge(status)}">${esc(status) || '—'}</span></td>
        <td class="value ${val > 100000 ? 'high' : val > 20000 ? 'med' : ''}">${fmtUSD(val)}</td>
        <td style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${esc(f['Product Category'] || '—')}</td>
        <td class="date-cell ${followUpClass}">${followUpStr}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">${age}</td>
        <td>${outcome ? `<span class="badge ${outcomeBadge(outcome)}">${esc(outcome)}</span>` : ''}</td>
      </tr>`;
    }).join('');

    document.getElementById('quotesTableWrap').innerHTML = `
      <table>
        <thead><tr>
          <th>Quote #</th>
          <th>RFQ Reference</th>
          <th>Account</th>
          <th>Status</th>
          <th style="text-align:right">Value</th>
          <th>Product</th>
          <th>Follow-Up</th>
          <th>Age</th>
          <th>Outcome</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterQuotes(status, btn) {
    quoteFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => {
      if (b.closest('.panel') === btn.closest('.panel')) b.classList.remove('active');
    });
    btn.classList.add('active');
    renderQuotes();
  }

  // ── HELPERS ────────────────────────────────────────────
  function fmtUSD(v) {
    if (!v) return '$0';
    if (v >= 1000000) return '$' + (v/1000000).toFixed(2) + 'M';
    if (v >= 1000) return '$' + Math.round(v/1000) + 'K';
    return '$' + v.toLocaleString();
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' });
  }

  function closureDateClass(d) {
    if (!d) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const dt = new Date(d);
    const diff = (dt - today) / 86400000;
    if (diff < 0) return 'overdue';
    if (diff <= 14) return 'soon';
    return '';
  }

  function followUpDateClass(d, status) {
    if (!d || status === 'Won' || status === 'Lost') return '';
    return closureDateClass(d);
  }

  function stageBadge(s) {
    const map = {
      'RFQ Received': 'badge-rfq',
      'Quoted': 'badge-quoted',
      'Negotiation': 'badge-negotiation',
      'Won': 'badge-won',
      'Lost': 'badge-lost'
    };
    return map[s] || 'badge-default';
  }

  function statusBadge(s) {
    const map = { 'Sent': 'badge-sent', 'Draft': 'badge-draft', 'Won': 'badge-won', 'Lost': 'badge-lost' };
    return map[s] || 'badge-default';
  }

  function outcomeBadge(o) {
    if (o === 'Won') return 'badge-won';
    if (o === 'Lost') return 'badge-lost';
    return 'badge-default';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(id, msg) {
    document.getElementById(id).innerHTML =
      `<div class="error-msg">⚠ Failed to load: ${esc(msg)}<br><br>Check your API key in config.js</div>`;
  }

  // ── INIT ───────────────────────────────────────────────
  loadAll();
</script>
</body>
</html>
