name: Deploy with secrets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject tokens
        run: |
          sed -i 's/AIRTABLE_TOKEN_PLACEHOLDER/${{ secrets.AIRTABLE_TRUCO_TOOLS }}/g' deal-dashboard.html
          sed -i 's/AIRTABLE_TOKEN_PLACEHOLDER/${{ secrets.AIRTABLE_TRUCO_TOOLS }}/g' quote-tracker.html
          sed -i 's/AIRTABLE_TOKEN_PLACEHOLDER/${{ secrets.AIRTABLE_TRUCO_TOOLS }}/g' order-bank.html
          sed -i 's/AIRTABLE_TOKEN_PLACEHOLDER/${{ secrets.AIRTABLE_TRUCO_TOOLS }}/g' dashboard.html

      - name: Verify token injection
        run: |
          if grep -l 'AIRTABLE_TOKEN_PLACEHOLDER' deal-dashboard.html quote-tracker.html order-bank.html dashboard.html; then
            echo "::error::AIRTABLE_TOKEN_PLACEHOLDER still present in the file(s) above after injection — the sentinel is missing or misspelled. Aborting deploy."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
