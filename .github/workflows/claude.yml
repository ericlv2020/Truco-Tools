name: Claude Assistant

# Triggers: Claude responds when @claude is mentioned in an issue/PR
# comment, a PR review, or a review comment — and on new/assigned/labeled issues.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # let Claude read/modify repo files
      pull-requests: write   # let Claude open/update PRs
      issues: write          # let Claude comment on issues
      id-token: write        # required for GitHub App auth
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
